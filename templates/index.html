<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoAgent IA | Votre Expert Immobilier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Google Fonts pour un look moderne -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar : Contexte de la recherche ou du bien -->
        <aside class="sidebar">
            <div class="logo">
                <h2>🏢 ImmoAgent IA</h2>
            </div>
            <p class="sidebar-desc">Paramètres du bien pour affiner l'estimation et les conseils du modèle.</p>
            
            <form id="context-form" class="context-form">
                <div class="input-group">
                    <label for="ville">Ville / Quartier</label>
                    <input type="text" id="ville" placeholder="Ex: Rabat, Agdal...">
                </div>
                <div class="input-group">
                    <label for="surface">Surface (m²)</label>
                    <input type="number" id="surface" placeholder="Ex: 120">
                </div>
                <div class="input-group">
                    <label for="type_bien">Type de bien</label>
                    <select id="type_bien">
                        <option value="appartement">Appartement</option>
                        <option value="villa">Villa</option>
                        <option value="terrain">Terrain</option>
                    </select>
                </div>
            </form>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <h3>Discussion avec l'Agent</h3>
                <span class="status">En ligne</span>
            </div>
            
            <div id="chat-box" class="chat-box">
                <div class="message bot">
                    <div class="bubble">
                        Bonjour ! Je suis votre agent immobilier IA. Dites-moi ce que vous recherchez ou décrivez le bien que vous souhaitez estimer.
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Posez votre question sur l'immobilier..." autocomplete="off">
                <button id="send-btn">Envoyer</button>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
